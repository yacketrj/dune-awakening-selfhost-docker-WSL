name: dune-awakening-selfhost-docker

services:
  redblink-dune-docker-console:
    build:
      context: .
      dockerfile: console/api/Dockerfile
    image: redblink-dune-docker-console:dev
    container_name: redblink-dune-docker-console
    restart: unless-stopped
    mem_limit: "${ADMIN_CONTAINER_MEMORY_LIMIT:-512m}"
    cpus: "${ADMIN_CONTAINER_CPUS:-1.0}"
    pids_limit: "${ADMIN_CONTAINER_PIDS_LIMIT:-256}"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "${DUNE_HOST_UID:-0}:${DUNE_HOST_GID:-0}"
    # Host networking lets the console reach RedBlink defaults such as
    # Postgres on 127.0.0.1:15432 and bind ADMIN_BIND_PORT directly.
    network_mode: host
    group_add:
      - "${DOCKER_SOCKET_GID:-0}"
    environment:
      DUNE_DOCKER_DIR: /repo
      DUNE_CONTAINER_REPO_ROOT: /repo
      DUNE_HOST_REPO_ROOT: "${DUNE_HOST_REPO_ROOT:-${PWD}}"
      # Make RedBlink dune scripts target the main Dune stack, not this web-only compose project.
      COMPOSE_PROJECT_NAME: "${DUNE_COMPOSE_PROJECT_NAME:-dune-awakening-selfhost-docker}"
      ADMIN_BIND_HOST: "${ADMIN_BIND_HOST:-127.0.0.1}"
      ADMIN_BIND_PORT: "${ADMIN_BIND_PORT:-8088}"
      ADMIN_AUTH_DISABLED: "${ADMIN_AUTH_DISABLED:-0}"
      ADMIN_SECURE_COOKIES: "${ADMIN_SECURE_COOKIES:-0}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      ADMIN_TASK_RETENTION: "${ADMIN_TASK_RETENTION:-200}"
      ADMIN_COMMAND_TIMEOUT_MS: "${ADMIN_COMMAND_TIMEOUT_MS:-1800000}"
      ADMIN_MAX_JSON_BYTES: "${ADMIN_MAX_JSON_BYTES:-2097152}"
      ADMIN_MAX_UPLOAD_BYTES: "${ADMIN_MAX_UPLOAD_BYTES:-134217728}"
      ADMIN_MAX_SSE_CONNECTIONS: "${ADMIN_MAX_SSE_CONNECTIONS:-20}"
      ALLOW_HOST_BOOTSTRAP: "${ALLOW_HOST_BOOTSTRAP:-false}"
      ADMIN_MOCK_MODE: "${ADMIN_MOCK_MODE:-0}"
      ADMIN_STATIC_DIR: /app/web-dist
      ADMIN_DATABASE_URL: "${ADMIN_DATABASE_URL:-}"
      DUNE_DB_HOST: "${DUNE_DB_HOST:-}"
      DUNE_DB_PORT: "${DUNE_DB_PORT:-}"
      DUNE_DB_NAME: "${DUNE_DB_NAME:-}"
      DUNE_DB_USER: "${DUNE_DB_USER:-}"
      DUNE_DB_PASSWORD: "${DUNE_DB_PASSWORD:-}"
      DUNE_COMMAND_AUTH_TOKEN: "${DUNE_COMMAND_AUTH_TOKEN:-}"
    volumes:
      - "${DUNE_HOST_REPO_ROOT:-.}:/repo"
      - /etc/localtime:/etc/localtime:ro
      # WARNING: mounting the Docker socket gives this container broad control
      # over the host Docker daemon. Expose the web admin only to trusted admins.
      - /var/run/docker.sock:/var/run/docker.sock
