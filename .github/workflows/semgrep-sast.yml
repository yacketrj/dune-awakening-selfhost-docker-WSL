name: Semgrep SAST

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/semgrep-sast.yml"
      - "scripts/generate-vulnerability-report.mjs"
      - "scripts/sync-vulnerability-issues.mjs"
  push:
    branches:
      - main
      - feature/discord-control-bot
    paths:
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/semgrep-sast.yml"
      - "scripts/generate-vulnerability-report.mjs"
      - "scripts/sync-vulnerability-issues.mjs"
  schedule:
    - cron: "17 10 * * 2"

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write

defaults:
  run:
    shell: bash

jobs:
  semgrep:
    name: Semgrep CE SAST
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    container:
      image: semgrep/semgrep
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: mkdir -p artifacts/security

      - name: Run Semgrep JSON scan
        run: semgrep scan --config auto --json --output artifacts/security/semgrep.json .

      - name: Generate Semgrep vulnerability report
        if: always()
        run: node scripts/generate-vulnerability-report.mjs artifacts/security/semgrep.json

      - name: Track Semgrep CRITICAL/HIGH/MEDIUM equivalent findings as GitHub issues
        if: always() && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/sync-vulnerability-issues.mjs artifacts/security/vulnerability-report.json --no-close-resolved

      - name: Preview Semgrep issue sync for pull requests
        if: always() && github.event_name == 'pull_request'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/sync-vulnerability-issues.mjs artifacts/security/vulnerability-report.json --dry-run --no-close-resolved

      - name: Run Semgrep SARIF scan
        if: always()
        run: semgrep scan --config auto --sarif --output artifacts/security/semgrep.sarif .

      - name: Upload Semgrep SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/security/semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-results
          path: |
            artifacts/security/semgrep.json
            artifacts/security/semgrep.sarif
            artifacts/security/vulnerability-report.json
            artifacts/security/vulnerability-report.md
          if-no-files-found: warn
