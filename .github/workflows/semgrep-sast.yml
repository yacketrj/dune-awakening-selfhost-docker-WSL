name: Semgrep SAST

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/semgrep-sast.yml"
  push:
    branches:
      - main
      - feature/discord-control-bot
    paths:
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - ".github/workflows/semgrep-sast.yml"
  schedule:
    - cron: "17 10 * * 2"

permissions:
  contents: read
  security-events: write
  actions: read

defaults:
  run:
    shell: bash

jobs:
  semgrep:
    name: Semgrep CE SAST
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    container:
      image: semgrep/semgrep
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: mkdir -p artifacts/security

      - name: Run Semgrep JSON scan
        run: semgrep scan --config auto --json --output artifacts/security/semgrep.json .

      - name: Run Semgrep SARIF scan
        if: always()
        run: semgrep scan --config auto --sarif --output artifacts/security/semgrep.sarif .

      - name: Upload Semgrep SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: artifacts/security/semgrep.sarif
          category: semgrep

      - name: Upload Semgrep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-results
          path: |
            artifacts/security/semgrep.json
            artifacts/security/semgrep.sarif
          if-no-files-found: warn
