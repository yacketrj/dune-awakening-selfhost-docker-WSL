global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: dune-prometheus
    static_configs:
      - targets:
          - dune-prometheus:9090
        labels:
          service: prometheus

  - job_name: dune-node
    static_configs:
      - targets:
          - dune-node-exporter:9100
        labels:
          service: node-exporter

  - job_name: dune-cadvisor
    scrape_interval: 10s
    static_configs:
      - targets:
          - dune-cadvisor:8080
        labels:
          service: cadvisor

  - job_name: dune-postgres
    static_configs:
      - targets:
          - dune-postgres-exporter:9187
        labels:
          service: postgres-exporter

  - job_name: dune-rabbitmq-admin
    static_configs:
      - targets:
          - dune-rmq-admin:15692
        labels:
          service: rabbitmq-admin

  - job_name: dune-rabbitmq-game
    static_configs:
      - targets:
          - dune-rmq-game:15692
        labels:
          service: rabbitmq-game
