; Settings in these config files will be applied to every server in the battlegroup
; If you need to override different settings for different servers, use the battlegroup editor instead
; Advanced community-documented fields below are emitted for Docker Saved/UserSettings use.

[/Script/DuneSandbox.PvpPveSettings]
; Enable PVP for all partitions
m_bShouldForceEnablePvpOnAllPartitions=False
; Enable PVP for specific partitions. Example:
;+m_PvpEnabledPartitions=1
;+m_PvpEnabledPartitions=2
; Explicitly enable PVE for specific partitions. Example:
;+m_PveEnabledPartitions=1

[/Script/DuneSandbox.SecurityZonesSubsystem]
; Disabling security zones across the board allows for PVP and ability usage everywhere
m_bAreSecurityZonesEnabled=True

[/DeteriorationSystem.ItemDeteriorationConstants]
; Deterioration rate for items | (0 to 10)  0=off
UpdateRateInSeconds=1.0

[/Script/DuneSandbox.SandStormConfig]
; Enable Coriolis storm
m_bCoriolisAutoSpawnEnabled=True
; Advanced storm timing settings from community documentation
m_StormCycleDuration=7200
m_StormDuration=600
m_StormWarningDuration=120
m_StormCycleWait=300

[/Script/DuneSandbox.BuildingSettings]
; Max number of landclaims. !Needs to also be applied to each client!
m_MaxNumLandclaimSegments=6
; Number of times a landclaim can be expanded
m_BuildingBlueprintMaxExtensions=4
m_BaseBackupMaxExtensions=8
; Enable building restriction limits !Needs to also be applied to each client!
m_bBuildingRestrictionLimitsEnabled=True

[/Script/DuneSandbox.DuneGameMode]
; Advanced progression and economy settings from community documentation
m_GlobalXPMultiplier=1.0
m_GlobalFameMultiplier=1.0
m_GlobalProgressionSpeedMultiplier=1.0
m_GuildCreationCost=1000
SellOrderPricePercentageFee=2.0
SpiceTaxAmount=0.1
SpiceTaxInterval=3600

; Advanced harvesting and crafting settings from community documentation
m_GlobalHarvestAmountMultiplier=1.0
m_GlobalHarvestHealthMultiplier=1.0
CutterayHemMultiplierPerNodeTierTable=1.0
m_MinimumAugmentableItemQuality=0
m_ItemDurabilityLossMultiplier=1.0

; Advanced survival and combat settings from community documentation
bPvPEnabled=False
bServerPVE=True
m_WaterConsumptionRate=1.0
m_WaterConsumptionInStormMultiplier=4.0
m_GlobalDamageToNpcsMultiplier=1.0
m_GlobalDamageToPlayersMultiplier=1.0
m_GlobalHealthMultiplier=1.0
m_GlobalBuildingDamageMultiplier=1.0
m_BuildingDecayRateMultiplier=1.0
bEnableBuildingStability=True
m_InventoryWeightMultiplier=1.0
m_PlayerStartingWater=100.0
m_DefaultReconnectGracePeriodSeconds=300

; Advanced world reset, clan, permission, and vehicle settings from community documentation
m_CycleDurationInDays=7
m_bIsDbWipeEnabled=True
m_MaxGuildMembersAllowed=32
m_MaxGuildsAllowed=3
m_MaxPermissionsPerActor=20
m_VehicleQuicksandDamage=10.0

[/Script/DuneSandbox.InventorySystemSettings]
; Advanced inventory settings from community documentation
PlayerInventoryStartingSize=40
PlayerInventoryStartingVolumeCapacity=225.0

[/Script/DuneSandbox.SandwormSettings]
; Advanced sandworm settings from community documentation
m_EnableSandwormSystem=UseAllowList
WormDetectionDistance=5000.0
m_MinWormSpawnInternal=300.0
m_MinDistanceBetweenSandworms=3000.0
m_SandwormQuicksandSpeedModifier=0.5

[/Script/DuneSandbox.PatrolShipSettings]
; Advanced patrol ship settings from community documentation
m_TimeOfDayToSpawn=18.0
m_TimeOfDayToDespawn=6.0
