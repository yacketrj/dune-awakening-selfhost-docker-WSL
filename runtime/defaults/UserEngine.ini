; Global UserEngine defaults for dune-docker.
; Settings in this file are applied to every server in the battlegroup.
; Map-specific UserGame settings can customize gameplay for individual maps,
; but this file remains the global baseline for every server.

[ConsoleVariables]
; Mining multipliers
Dune.GlobalMiningOutputMultiplier=1.0
Dune.GlobalVehicleMiningOutputMultiplier=1.0
SecurityZones.PvpResourceMultiplier=2.5

; Durability damage multiplier for vehicles | (0 to 10)  0=off
dw.VehicleDurabilityDamageMultiplier=1.0

; Sandstorm and sandstorm treasure spawning settings
Sandstorm.Enabled=1
Sandstorm.Treasure.Enabled=1

; Sandworm settings
sandworm.dune.Enabled=1
; Sandworm can push/damage vehicles
Vehicle.SandwormCollisionInteraction=false
; Enables dangerzones where the sandworm can attack
Sandworm.SandwormDangerZonesEnabled=true
; Seconds of invunerability from sandworm on specific situations
Vehicle.SandwormInvulnerabilitySecondsOnExit=900.0
Vehicle.SandwormInvulnerabilitySecondsOnServerRestart=7200.0
